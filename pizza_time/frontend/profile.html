<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pizza Time - Профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">← Вернуться к меню</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <div class="position-relative d-inline-block">
                                <img id="display-avatar" 
                                    src="https://ui-avatars.com/api/?name=User&background=0D6EFD&color=fff" 
                                    class="rounded-circle shadow-sm mb-2" 
                                    alt="Avatar" 
                                    width="100" 
                                    height="100" 
                                    style="object-fit: cover;">
                                <button type="button" id="change-avatar-btn" class="btn btn-sm btn-dark position-absolute bottom-0 end-0 rounded-circle d-none">
                                    ✎
                                </button>
                                <input type="file" id="avatar-input" class="d-none" accept="image/*">
                            </div>
                            <h2 id="display-username" class="fw-bold">@username</h2>
                        </div>

                        <form id="profile-form">
                            <div class="row g-3">

                                <div class="col-md-6">
                                    <label class="form-label small text-muted text-uppercase fw-bold">Имя</label>
                                    <input type="text" id="first_name" class="form-control-plaintext border-bottom px-2" readonly placeholder="Не указано">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small text-muted text-uppercase fw-bold">Фамилия</label>
                                    <input type="text" id="last_name" class="form-control-plaintext border-bottom px-2" readonly placeholder="Не указано">
                                </div>

                                <div class="col-12">
                                    <label class="form-label small text-muted text-uppercase fw-bold">Email</label>
                                    <input type="email" id="email" class="form-control-plaintext border-bottom px-2" readonly placeholder="Не указано">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small text-muted text-uppercase fw-bold">Дата рождения</label>
                                    <input type="date" id="date_birth" class="form-control-plaintext border-bottom px-2" readonly>  
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small text-muted text-uppercase fw-bold">Телефон</label>
                                    <input type="tel" id="phone" class="form-control-plaintext border-bottom px-2" readonly placeholder="+7 (___) ___ __ __">
                                </div>
                            </div>

                            <div class="mt-4 d-grid gap-2">
                                <button type="button" id="edit-mode-btn" class="btn btn-outline-primary py-2 fw-bold">
                                    Редактировать профиль
                                </button>

                                <div id="edit-actions" class="d-none d-grid gap-2">
                                    <button type="submit" id="save-btn" class="btn btn-success py-2 fw-bold">
                                        Сохранить изменения
                                    </button>
                                    <button type="button" id="cancel-btn" class="btn btn-outline-secondary py-2">
                                        Отмена
                                    </button>
                                </div>
                                
                                <button type="button" id="delete-profile-btn" class="btn btn-outline-danger btn-sm border-0 mt-2">
                                    Удалить аккаунт
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/profile.js"></script>
</body>
</html>
